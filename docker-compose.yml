version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: commy_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: commy
    volumes:
      - mongodb_data:/data/db
    networks:
      - commy_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: commy_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/commy
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      CUSTOMER_APP_URL: ${CUSTOMER_APP_URL:-http://localhost:5174}
      ADMIN_APP_URL: ${ADMIN_APP_URL:-http://localhost:5173}
    depends_on:
      - mongodb
    networks:
      - commy_network

  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api/v1}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:5000}
    container_name: commy_frontend_admin
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - commy_network

  frontend-usuario:
    build:
      context: ./frontend-usuario
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api/v1}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:5000}
    container_name: commy_frontend_usuario
    restart: unless-stopped
    ports:
      - "5174:80"
    networks:
      - commy_network

volumes:
  mongodb_data:

networks:
  commy_network:
    driver: bridge
